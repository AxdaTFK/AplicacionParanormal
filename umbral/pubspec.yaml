name: umbral
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/UmbralLogo.png"
  adaptive_icon_background: "##181e36"
  adaptive_icon_foreground: "assets/icons/UmbralLogo.png"

flutter_native_splash:
  color: "##181e36"
  image: "assets/icons/UmbralLogo.png"
  android_12:
    image: "assets/icons/UmbralLogo.png"
    color: "#181e36"